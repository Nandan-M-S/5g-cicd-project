name: CI/CD

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v3

    - name: Install Docker
      run: sudo apt-get update && sudo apt-get install -y docker.io

    - name: Build Docker Image
      run: docker build -t open5gs-core .

    - name: Run Test
      run: bash scripts/test.sh
